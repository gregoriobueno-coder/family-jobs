name: Autonomous Job Scraper

on:
  schedule:
    # Runs at 00:00 UTC every day (approx 8:00 PM EST)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allows manual trigger of the scraping pipeline from the GitHub Actions tab

# Grant permission to commit and push changes back to the repository
permissions:
  contents: write

jobs:
  run-pipeline:
    name: Run Scraper and Filter Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # persist-credentials: true is default but explicit here to clarify push authorization
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          playwright install chromium

      - name: Execute Scraper Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scraper.py

      - name: Commit and Push Database Changes
        run: |
          git config --global user.name "GitHub Action Scraper"
          git config --global user.email "action@github.com"
          git add database/jobs.json
          git commit -m "chore: auto-update scraped job database [skip ci]" || exit 0
          git push
